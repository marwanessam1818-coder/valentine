<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine's Day</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap');
        
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #0f172a; font-family: 'Poppins', sans-serif; overflow: hidden;
            transition: background-color 0.8s ease;
        }

        .container { text-align: center; width: 100%; max-width: 500px; padding: 20px; }
        
        .question { font-size: 2.2rem; margin-bottom: 2rem; color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }

        .btn-group { display: flex; justify-content: center; gap: 20px; position: relative; height: 60px; }

        .btn {
            padding: 15px 35px; border: none; border-radius: 50px; font-size: 1.1rem; cursor: pointer;
            transition: all 0.3s ease; background-color: #ff54a4; color: white;
            box-shadow: 0px 5px 15px rgba(255, 84, 164, 0.4);
            touch-action: none; /* لمنع التعليق على الموبايل */
        }

        #noBtn { position: absolute; transition: 0.15s ease; z-index: 10; }

        #loveImage {
            display: none; 
            width: 250px; 
            height: 250px; 
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid white;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: popIn 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="text" class="question">Will you be my Valentine? ❤️</h1>
        
        <img id="loveImage" src="us.jpeg" alt="Our Photo">

        <div class="btn-group" id="btnGroup">
            <button class="btn" id="yesBtn">Yes</button>
            <button class="btn" id="noBtn">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const text = document.getElementById('text');
        const loveImage = document.getElementById('loveImage');
        const btnGroup = document.getElementById('btnGroup');

        function moveButton() {
            // حساب المسافات المتاحة مع مراعاة حجم الشاشة
            const maxX = window.innerWidth - noBtn.clientWidth - 20;
            const maxY = window.innerHeight - noBtn.clientHeight - 20;
            
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            const randomY = Math.max(10, Math.floor(Math.random() * maxY));
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // الكمبيوتر
        noBtn.addEventListener('mouseover', moveButton);
        
        // الموبايل
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        // عند الموافقة
        yesBtn.addEventListener('click', () => {
            text.innerHTML = "I Knew You'd Say Yes! 😍";
            loveImage.style.display = 'block';
            btnGroup.style.display = 'none';
            document.body.style.backgroundColor = '#ff54a4';
        });
    </script>
</body>
</html>
